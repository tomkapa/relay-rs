services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: relay-postgres
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - relay_pg_data:/var/lib/postgresql/data

volumes:
  relay_pg_data:
